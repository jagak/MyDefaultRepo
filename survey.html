<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send feedback</title>
    <script src="https://res.cdn.office.net/teams-js/2.36.0/js/MicrosoftTeams.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 16px; margin: 0; color: #242424; }
        h1 { font-size: 16px; font-weight: 600; margin: 0 0 8px 0; }
        .reaction { font-size: 28px; line-height: 1; }
        .meta { color: #616161; font-size: 12px; margin-bottom: 12px; }
        textarea { width: 100%; box-sizing: border-box; min-height: 120px; padding: 8px; border: 1px solid #d1d1d1; border-radius: 4px; font-family: inherit; font-size: 13px; resize: vertical; }
        .actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
        button { padding: 6px 16px; font-size: 13px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
        .primary { background: #6264a7; color: #fff; }
        .primary:hover { background: #494b83; }
        .secondary { background: #f5f5f5; color: #242424; border-color: #d1d1d1; }
        .secondary:hover { background: #e5e5e5; }
        .status { font-size: 12px; color: #d13438; margin-top: 8px; min-height: 16px; }
    </style>
</head>
<body>
    <h1><span class="reaction" id="reactionIcon"></span> Tell us more (optional)</h1>
    <div class="meta" id="meta"></div>
    <textarea id="comment" placeholder="What worked well? What didn't?"></textarea>
    <div class="actions">
        <button class="secondary" id="cancelBtn">Cancel</button>
        <button class="primary" id="submitBtn">Submit</button>
    </div>
    <div class="status" id="status"></div>

    <script>
        (function () {
            "use strict";

            // Parse query string params injected by the bot's TaskModuleContinueResponse URL.
            var params = new URLSearchParams(window.location.search);
            var reaction = params.get("reaction") || "";
            var replyToId = params.get("replyToId") || "";

            document.getElementById("reactionIcon").textContent = reaction === "like" ? "👍" : (reaction === "dislike" ? "👎" : "💬");
            document.getElementById("meta").textContent =
                "Reaction: " + (reaction || "(unknown)") +
                " · Message id: " + (replyToId ? replyToId.substring(0, 12) + "…" : "(none)");

            var statusEl = document.getElementById("status");

            // PROTOTYPE: this page does not yet POST to OCV. We just collect the comment and call
            // dialog.url.submit so Teams fires message/submitTask back to the bot — that's what
            // the prototype is validating. OCV integration is the next step once round-trip works.
            function init() {
                if (typeof microsoftTeams === "undefined") {
                    statusEl.textContent = "Teams JS SDK failed to load.";
                    return;
                }

                microsoftTeams.app.initialize().then(function () {
                    document.getElementById("submitBtn").addEventListener("click", function () {
                        var comment = document.getElementById("comment").value || "";
                        microsoftTeams.dialog.url.submit({
                            isSubmitted: true,
                            reaction: reaction,
                            replyToId: replyToId,
                            comment: comment,
                        });
                    });

                    document.getElementById("cancelBtn").addEventListener("click", function () {
                        microsoftTeams.dialog.url.submit({
                            isSubmitted: false,
                            reaction: reaction,
                            replyToId: replyToId,
                        });
                    });
                }).catch(function (err) {
                    statusEl.textContent = "Teams init failed: " + (err && err.message ? err.message : err);
                });
            }

            if (document.readyState === "complete" || document.readyState === "interactive") {
                init();
            } else {
                document.addEventListener("DOMContentLoaded", init);
            }
        })();
    </script>
</body>
</html>
